# Security finding disclosure tracker.
#
# This file is the single source of truth for the redaction logic in
# benchmark.security and for the public Disclosure Tracker table that
# renders on /security. Every (test, tool) pair where the benchmark
# observed a FAIL gets a finding entry below.
#
# Statuses progress in this order:
#   confirmed     — we reproduced the FAIL locally on the benchmark image
#   reported      — we contacted the upstream maintainer (GH issue or email)
#   acknowledged  — maintainer confirmed they're aware
#   patched       — a fix landed upstream (no advisory yet)
#   cve_assigned  — a CVE id was issued
#   disclosed     — public advisory is out; the tool can be named in the
#                   published security.json (move tool out of [label] then)
#
# The [label] table maps internal tool IDs to opaque public labels. The
# benchmark's publish step substitutes these into the redacted JSON that
# goes to docs/public/data/security.json. GitHacker (us) is never
# redacted. Labels are stable — once assigned, do not renumber, even if
# a tool exits the redaction set, so external readers tracking advisories
# can correlate across versions.

[label]
dumpall = "Tool A"
dvcs-ripper = "Tool B"
git-dumper = "Tool C"
githack = "Tool D"
gittools = "Tool E"
rbozburun-git-hacker = "Tool F"

# --- GitHacker self-found, self-fixed (kept for record / honesty) ---

[[finding]]
id = "DIS-2026-001"
test = "C3_redirect_ssrf"
tool = "githacker"
severity = "L"
status = "patched"
first_observed = "2026-05-27"
reported_at = "2026-05-27"
patched_at = "2026-05-27"
cve = ""
notes = "Self-discovered by this benchmark; fixed in commit bdff7ee — `OriginRestrictedSession` refuses cross-origin 3xx redirects."

