repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: debug-statements
    -   id: name-tests-test
    -   id: requirements-txt-fixer
    -   id: check-json
    -   id: pretty-format-json
        args: [--autofix, --indent=4]
-   repo: https://github.com/asottile/setup-cfg-fmt
    rev: v2.8.0
    hooks:
    -   id: setup-cfg-fmt
# ruff is the all-in-one Python linter + formatter and the single source of
# truth here: CI runs `uv run ruff check .`, so we run the *same* ruff via
# `uv run` (the version pinned in the project's dev deps / uv.lock) instead
# of a separately-pinned mirror — no drift between the hook and CI. This one
# tool replaces flake8, autopep8, pyupgrade, autoflake, reorder-python-imports,
# add-trailing-comma, and double-quote-string-fixer.
-   repo: local
    hooks:
    -   id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
    -   id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
    -   id: mypy
        additional_dependencies:
            - types-pyyaml
            - types-requests
            - pandas-stubs
        exclude: ^testing/resources/
-   repo: https://github.com/citation-file-format/cffconvert
    rev: 054bda51dbe278b3e86f27c890e3f3ac877d616c
    hooks:
      - id: validate-cff
